name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build and publish Python distribution
    runs-on: ubuntu-latest
    
    # Required for Trusted Publishing (OIDC) to PyPI
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # hatch-vcs derives the version from git tags — full history needed.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build hatchling hatch-vcs

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify built version matches release tag
        run: |
          BUILT=$(ls dist/*.whl | sed -E 's/.*sto_warp-([^-]+)-.*/\1/' | head -1)
          TAG="${GITHUB_REF_NAME#v}"
          echo "Built wheel: $BUILT  |  Release tag: $TAG"
          if [ "$BUILT" != "$TAG" ]; then
            echo "::error::Wheel version $BUILT does not match tag $TAG"
            exit 1
          fi

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # If you don't use Trusted Publishing, uncomment the password line and add a secret
          # password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
