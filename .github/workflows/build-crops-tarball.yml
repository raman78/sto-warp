name: Build community-crops tarball

# Weekly rebuild of crops.tar + crops_manifest.json for sto-warp cold-start
# downloads. Idempotent: the script exits 0 without uploading when the
# dataset SHA matches the existing manifest, so a no-op run is free.

on:
  schedule:
    - cron: '0 4 * * 1'   # Mondays 04:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'huggingface_hub>=0.25'

      - name: Build & upload tarball if dataset changed
        env:
          HF_TOKEN: ${{ secrets.HF_DATASET_WRITE_TOKEN }}
        run: python tools/build_crops_tarball.py
