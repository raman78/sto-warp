name: Build Windows installer

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for the installer (e.g. 1.0.11). Used only on workflow_dispatch.'
        required: false
        default: '0.0.0-dev'

jobs:
  build-installer:
    name: Build .exe installer
    runs-on: windows-latest

    permissions:
      contents: write   # upload-release-asset

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # hatch-vcs needs full history

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ github.event.inputs.version }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Install build dependencies (CPU-only torch)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          pip install .
          pip install pyinstaller pillow

      - name: Build icon
        run: python packaging/windows/build_icon.py

      - name: Build PyInstaller bundle
        run: pyinstaller --noconfirm --clean packaging/windows/sto-warp.spec

      - name: Build Inno Setup installer
        run: iscc /DSTOWarpVersion=${{ steps.ver.outputs.version }} packaging\windows\sto-warp.iss

      - name: Locate installer
        id: locate
        shell: bash
        run: |
          EXE="dist/installer/sto-warp-${{ steps.ver.outputs.version }}-setup.exe"
          if [ ! -f "$EXE" ]; then
            echo "::error::Installer missing at $EXE"
            ls -la dist/installer/ || true
            exit 1
          fi
          SIZE=$(stat -c%s "$EXE" 2>/dev/null || stat -f%z "$EXE")
          echo "exe=$EXE" >> "$GITHUB_OUTPUT"
          echo "Installer: $EXE ($SIZE bytes)"

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sto-warp-${{ steps.ver.outputs.version }}-setup
          path: ${{ steps.locate.outputs.exe }}
          if-no-files-found: error

      - name: Attach installer to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.locate.outputs.exe }}" --clobber
